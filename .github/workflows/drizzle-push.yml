# Sincroniza o schema Drizzle com o banco LibSQL (ex.: Turso).
#
# OBRIGATÓRIO — secrets do REPOSITÓRIO (não use .env no repositório):
#   GitHub → repositório → Settings → Secrets and variables → Actions
#   → aba "Repository secrets" → New repository secret
#   Nomes exatos: DATABASE_URL  e  DATABASE_AUTH_TOKEN
#   (arquivo .env.local na sua máquina NÃO alimenta o Actions.)
#
# Depois: Actions → "Drizzle — push schema" → Run workflow.

name: Drizzle — push schema

env:
  # Evita aviso de depreciação Node 20 nos actions oficiais (changelog GitHub 2025).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'lib/db/schema.ts'
      - 'drizzle.config.ts'

concurrency:
  group: drizzle-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Drizzle Kit push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Secret DATABASE_URL ausente. No GitHub: Settings → Secrets and variables → Actions → Repository secrets → New repository secret (nome: DATABASE_URL, valor: URL libsql:// da Turso). Repita DATABASE_AUTH_TOKEN com o token."
            exit 1
          fi
          # Sem token, o push em Turso falha em "Pulling schema" sem mensagem clara.
          case "$DATABASE_URL" in
            libsql://*)
              if [ -z "$DATABASE_AUTH_TOKEN" ]; then
                echo "::error::Para URL libsql:// é obrigatório o secret DATABASE_AUTH_TOKEN (token da Turso). Cadastre em Settings → Secrets → Actions."
                exit 1
              fi
              ;;
          esac
          npx drizzle-kit push --verbose
